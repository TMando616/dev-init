name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, mysql, pdo_mysql, bcmath, gd, zip
          coverage: none

      - name: Install Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
        working-directory: backend

      - name: Copy .env
        run: cp .env.example .env
        working-directory: backend

      - name: Generate key
        run: php artisan key:generate
        working-directory: backend

      - name: Pre-pull and warm up Docker images
        run: |
          docker pull php:8.4-cli-alpine
          docker pull python:3.12-alpine
          docker pull node:22-alpine
          # `docker pull` only extracts layers; the first `docker run` still pays
          # the snapshot/container-creation cost. For the larger node image this
          # can exceed the 5s execution timeout on CI runners and flake the JS
          # test. Warm each image with a throwaway run so the test under test
          # only ever pays warm-start cost.
          docker run --rm php:8.4-cli-alpine php -r 'echo 1;'
          docker run --rm python:3.12-alpine python -c 'pass'
          docker run --rm node:22-alpine node -e ''

      - name: Run Tests
        run: php artisan test
        working-directory: backend

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: frontend

      - name: Run Lint
        run: npm run lint
        working-directory: frontend

      - name: Run Build
        run: npm run build
        working-directory: frontend
